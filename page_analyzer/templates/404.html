<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайты</title>
    <link href="{{ url_for('static', filename='bootstrap.min.css') }}" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1 0 auto;
        }
        footer {
            flex-shrink: 0;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid container-lg">
            <div class="navbar-nav me-auto flex-row gap-3">
                <a class="nav-link text-white-50 fs-5" href="/">Анализатор страниц</a>
                <a class="nav-link text-white-50 fs-5" href="/urls">Сайты</a>
            </div>
        </div>
    </nav>

    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category if category in ['success', 'danger'] else 'primary' }} rounded-0 border-0 mb-0 py-3 px-4 fs-5" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <main class="container-lg pt-5 flex-grow-1">
        
        <div class="container-lg text-center py-5">
            
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <h1 class="display-1 fw-bold text-secondary">404</h1>
                    <h2 class="fw-normal mb-3">Сайт не найден</h2>
                    <p class="text-muted mb-4">
                        Запрашиваемый сайт не существует или был удален. Проверьте правильность введенного ID в адресной строке.
                    </p>
                    <a href="/urls" class="btn btn-primary px-4">Перейти к списку сайтов</a>
                </div>
            </div>

        </div>

    </main>

    <footer class="border-top py-3 bg-white mt-auto">
        <div class="container text-center">
            <a href="https://hexlet.io" target="_blank" class="text-decoration-none text-primary">Hexlet</a>
        </div>
    </footer>

    <script src="https://yastatic.net" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
